          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementUpdateRequest"
      responses:
        "200":
          description: Updated requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"

    delete:
      operationId: deleteRequirement
      summary: Delete requirement
      description: Delete a requirement
      tags:
        - Requirements
      parameters:
        - name: requirement_id
          in: path
          required: true
          description: Requirement ID or reference number
          schema:
            type: string
      responses:
        "204":
          description: Requirement deleted

  /features/{feature_id}/requirements:
    get:
      operationId: listFeatureRequirements
      summary: List feature requirements
      description: Get all requirements for a feature
      tags:
        - Requirements
      parameters:
        - name: feature_id
          in: path
          required: true
          description: Feature ID or reference number
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of requirements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementsResponse"

    post:
      operationId: createFeatureRequirement
      summary: Create requirement for feature
      description: Create a new requirement for a feature
      tags:
        - Requirements
      parameters:
        - name: feature_id
          in: path
          required: true
          description: Feature ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequirementCreateRequest"
      responses:
        "201":
          description: Created requirement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"

  /comments/{comment_id}:
