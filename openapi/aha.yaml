            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsResponse"

    post:
      operationId: createIdeaComment
      summary: Create internal comment on an idea
      description: Create a new internal comment on an idea
      tags:
        - Comments
      parameters:
        - name: idea_id
          in: path
          required: true
          description: Idea ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
