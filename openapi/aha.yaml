          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsResponse"

  /goals/{goal_id}/comments:
    get:
      operationId: listGoalComments
      summary: List comments on a goal
      description: Get all comments on a goal
      tags:
        - Comments
      parameters:
        - name: goal_id
          in: path
          required: true
          description: Goal ID or reference number
          schema:
            type: string
        - name: page
