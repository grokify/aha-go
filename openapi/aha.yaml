      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"

  /products/{product_id}/releases:
    get:
      operationId: listProductReleases
      summary: List product releases
      description: Get all releases for a product
      tags:
        - Releases
      parameters:
        - name: product_id
          in: path
          required: true
          description: Product ID or reference prefix
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of releases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleasesResponse"

  /products/{product_id}/workflows:
    get:
      operationId: listProductWorkflows
      summary: List product workflows
      description: Get all workflows and their statuses for a product
      tags:
        - Workflows
      parameters:
        - name: product_id
          in: path
          required: true
          description: Product ID or reference prefix
          schema:
            type: string
      responses:
        "200":
          description: A list of workflows with statuses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowsResponse"

  /releases/{release_id}:
    get:
      operationId: getRelease
      summary: Get release
      description: Get a specific release by ID
      tags:
        - Releases
      parameters:
        - name: release_id
          in: path
          required: true
          description: Release ID or reference number
          schema:
            type: string
      responses:
        "200":
          description: Release details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"

    put:
      operationId: updateRelease
      summary: Update release
      description: Update an existing release
      tags:
        - Releases
      parameters:
        - name: release_id
          in: path
          required: true
          description: Release ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseUpdateRequest"
      responses:
        "200":
          description: Updated release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseResponse"

  /requirements/{requirement_id}:
    get:
      operationId: getRequirement
      summary: Get requirement
      description: Get a specific requirement by ID or reference number
      tags:
        - Requirements
      parameters:
        - name: requirement_id
          in: path
          required: true
          description: Requirement ID or reference number
          schema:
            type: string
      responses:
        "200":
          description: Requirement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequirementResponse"
        "404":
          description: Requirement not found

    put:
      operationId: updateRequirement
      summary: Update requirement
      description: Update an existing requirement
      tags:
        - Requirements
      parameters:
        - name: requirement_id
          in: path
          required: true
