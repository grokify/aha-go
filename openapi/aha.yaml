openapi: 3.0.3
info:
  title: Aha.io API
  description: |
    Go client for the Aha.io product management API.

    This OpenAPI specification is used to generate the internal API client
    via ogen. The public SDK provides ergonomic wrappers on top of the
    generated client.
  version: 1.0.0
  contact:
    name: Grokify
    url: https://github.com/grokify/aha-go
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://{subdomain}.aha.io/api/v1
    description: Aha.io API server
    variables:
      subdomain:
        default: secure
        description: Your Aha account subdomain

security:
  - bearerAuth: []

tags:
  - name: Comments
    description: Comment management
  - name: Epics
    description: Epic management
  - name: Features
    description: Feature management
  - name: Goals
    description: Goal management
  - name: Ideas
    description: Idea management
  - name: Initiatives
    description: Initiative management
  - name: Products
    description: Product (workspace) management
  - name: Releases
    description: Release management
  - name: Requirements
    description: Requirement management
  - name: StrategicModels
    description: Strategic model management (canvases)
  - name: Users
    description: User management
  - name: Workflows
    description: Workflow and status management

paths:
  /features:
    get:
      operationId: listFeatures
      summary: List features
      description: Get all features with optional filtering
      tags:
        - Features
      parameters:
        - name: q
          in: query
          description: Sub-string to match against feature name or ID
          schema:
            type: string
        - name: updated_since
          in: query
          description: UTC timestamp (ISO8601). Only features updated after this time.
          schema:
            type: string
            format: date-time
        - name: tag
          in: query
          description: Filter by tag value
          schema:
            type: string
        - name: assigned_to_user
          in: query
          description: Filter by assigned user ID or email
          schema:
            type: string
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          description: Results per page
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of features
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturesResponse"

  /features/{feature_id}:
    get:
      operationId: getFeature
      summary: Get feature
      description: Get a specific feature by ID or reference number
      tags:
        - Features
      parameters:
        - name: feature_id
          in: path
          required: true
          description: Numeric ID or reference number (e.g., PROD-123)
          schema:
            type: string
      responses:
        "200":
          description: Feature details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureResponse"
        "404":
          description: Feature not found

    put:
      operationId: updateFeature
      summary: Update feature
      description: Update an existing feature
      tags:
        - Features
      parameters:
        - name: feature_id
          in: path
          required: true
          description: Numeric ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureUpdateRequest"
      responses:
        "200":
          description: Updated feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureResponse"

  /releases/{release_id}/features:
    get:
      operationId: listReleaseFeatures
      summary: List features in release
      description: Get all features for a specific release
      tags:
        - Features
      parameters:
        - name: release_id
          in: path
          required: true
          description: Release ID or reference number
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of features in the release
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeaturesResponse"

    post:
      operationId: createReleaseFeature
      summary: Create feature in release
      description: Create a new feature in a release
      tags:
        - Features
      parameters:
        - name: release_id
          in: path
          required: true
          description: Release ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeatureCreateRequest"
      responses:
        "201":
          description: Created feature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeatureResponse"

  /epics:
    get:
      operationId: listEpics
      summary: List epics
      description: Get all epics with optional filtering
      tags:
        - Epics
      parameters:
        - name: q
          in: query
          description: Sub-string to match against epic name
          schema:
            type: string
        - name: updated_since
          in: query
          description: UTC timestamp (ISO8601). Only epics updated after this time.
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of epics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicsResponse"

  /epics/{epic_id}:
    get:
      operationId: getEpic
      summary: Get epic
      description: Get a specific epic by ID or reference number
      tags:
        - Epics
      parameters:
        - name: epic_id
          in: path
          required: true
          description: Epic ID or reference number
          schema:
            type: string
      responses:
        "200":
          description: Epic details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicResponse"
        "404":
          description: Epic not found

    put:
      operationId: updateEpic
      summary: Update epic
      description: Update an existing epic
      tags:
        - Epics
      parameters:
        - name: epic_id
          in: path
          required: true
          description: Epic ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpicUpdateRequest"
      responses:
        "200":
          description: Updated epic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicResponse"

  /products/{product_id}/epics:
    get:
      operationId: listProductEpics
      summary: List product epics
      description: Get all epics for a product
      tags:
        - Epics
      parameters:
        - name: product_id
          in: path
          required: true
          description: Product ID or reference prefix
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of epics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicsResponse"

  /releases/{release_id}/epics:
    post:
      operationId: createReleaseEpic
      summary: Create epic in release
      description: Create a new epic in a release
      tags:
        - Epics
      parameters:
        - name: release_id
          in: path
          required: true
          description: Release ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EpicCreateRequest"
      responses:
        "201":
          description: Created epic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EpicResponse"

  /ideas:
    get:
      operationId: listIdeas
      summary: List ideas
      description: Get all ideas with optional filtering
      tags:
        - Ideas
      parameters:
        - name: q
          in: query
          description: Search term to match against idea name
          schema:
            type: string
        - name: spam
          in: query
          description: When true, shows ideas marked as spam
          schema:
            type: boolean
        - name: workflow_status
          in: query
          description: Filter by workflow status ID or name
          schema:
            type: string
        - name: sort
          in: query
          description: Sort order
          schema:
            type: string
            enum: [recent, trending, popular]
        - name: created_before
          in: query
          description: UTC timestamp (ISO8601). Only ideas created before this time.
          schema:
            type: string
            format: date-time
        - name: created_since
          in: query
          description: UTC timestamp (ISO8601). Only ideas created after this time.
          schema:
            type: string
            format: date-time
        - name: updated_since
          in: query
          description: UTC timestamp (ISO8601). Only ideas updated after this time.
          schema:
            type: string
            format: date-time
        - name: tag
          in: query
          description: Filter by tag value
          schema:
            type: string
        - name: user_id
          in: query
          description: Filter by creator user ID
          schema:
            type: string
        - name: idea_user_id
          in: query
          description: Filter by idea user ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of ideas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeasResponse"

  /ideas/{idea_id}:
    get:
      operationId: getIdea
      summary: Get idea
      description: Get a specific idea by ID
      tags:
        - Ideas
      parameters:
        - name: idea_id
          in: path
          required: true
          description: Idea ID or reference number
          schema:
            type: string
      responses:
        "200":
          description: Idea details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaResponse"

    put:
      operationId: updateIdea
      summary: Update idea
      description: Update an existing idea
      tags:
        - Ideas
      parameters:
        - name: idea_id
          in: path
          required: true
          description: Idea ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IdeaUpdateRequest"
      responses:
        "200":
          description: Updated idea
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IdeaResponse"

  /products:
    get:
      operationId: listProducts
      summary: List products
      description: Get all products (workspaces) including Aha! Develop teams
      tags:
        - Products
      parameters:
        - name: updated_since
          in: query
          description: UTC timestamp (ISO8601). Only products updated after this time.
          schema:
            type: string
            format: date-time
        - name: with_idea_portals
          in: query
          description: Set to true to list only products with idea portals
