            format: int32
        - name: per_page
          in: query
          schema:
            type: integer
            format: int32
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentsResponse"

    post:
      operationId: createFeatureComment
      summary: Create comment on a feature
      description: Create a new comment on a feature
      tags:
        - Comments
      parameters:
        - name: feature_id
          in: path
          required: true
          description: Feature ID or reference number
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreateRequest"
      responses:
        "201":
          description: Created comment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentResponse"

  /ideas/{idea_id}/comments:
    get:
      operationId: listIdeaComments
      summary: List comments on an idea
      description: Get all comments on an idea
      tags:
        - Comments
      parameters:
        - name: idea_id
          in: path
          required: true
