                $ref: "#/components/schemas/CommentResponse"

  /releases/{release_id}/comments:
    get:
      operationId: listReleaseComments
      summary: List comments on a release
      description: Get all comments on a release
      tags:
        - Comments
      parameters:
        - name: release_id
          in: path
          required: true
