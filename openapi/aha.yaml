components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Aha API key as bearer token

  schemas:
    # Pagination
    Pagination:
      type: object
      properties:
        total_records:
          type: integer
          format: int64
        total_pages:
          type: integer
          format: int64
        current_page:
          type: integer
          format: int64

    # Feature schemas
    Feature:
      type: object
      required:
        - id
        - name
        - reference_num
        - created_at
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        product_id:
          type: string
        url:
          type: string
          description: Web UI URL
        resource:
          type: string
          description: API URL
        comments_count:
          type: integer
          format: int64
        progress_source:
          type: string
        work_units:
          type: integer
          format: int64
        use_requirements_estimates:
          type: boolean
        tags:
          type: array
          items:
            type: string
        workflow_status:
          $ref: "#/components/schemas/WorkflowStatus"
        release:
          $ref: "#/components/schemas/Release"
        assigned_to_user:
          $ref: "#/components/schemas/User"
        custom_fields:
          type: array
          items:
            $ref: "#/components/schemas/CustomField"
        integration_fields:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationField"

    FeatureMeta:
      type: object
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        url:
          type: string
        resource:
          type: string

    FeatureResponse:
      type: object
      properties:
        feature:
          $ref: "#/components/schemas/Feature"

    FeaturesResponse:
      type: object
      properties:
        features:
          type: array
          items:
            $ref: "#/components/schemas/FeatureMeta"
        pagination:
          $ref: "#/components/schemas/Pagination"

    FeatureCreateRequest:
      type: object
      required:
        - feature
      properties:
        feature:
          $ref: "#/components/schemas/FeatureCreate"

    FeatureCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Feature name
        description:
          type: string
          description: Feature description (HTML allowed)
        workflow_status:
          type: string
          description: Workflow status ID or name
        assigned_to_user:
          type: string
          description: User email to assign
        tags:
          type: string
          description: Comma-separated tags
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        original_estimate_text:
          type: string
          description: "Effort estimate (e.g., 2d, 4h, 30min, 5p)"
        initiative:
          type: string
          description: Initiative ID or name

    FeatureUpdateRequest:
      type: object
      required:
        - feature
      properties:
        feature:
          $ref: "#/components/schemas/FeatureUpdate"

    FeatureUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        workflow_status:
          type: string
        assigned_to_user:
          type: string
        tags:
          type: string
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        release:
          type: string
          description: Release ID to move feature to
        original_estimate_text:
          type: string
        remaining_estimate_text:
          type: string
        initiative:
          type: string
        release_phase:
          type: string

    # Idea update schemas
    IdeaUpdateRequest:
      type: object
      required:
        - idea
      properties:
        idea:
          $ref: "#/components/schemas/IdeaUpdate"

    IdeaUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        workflow_status:
          type: string
          description: Workflow status ID or name
        categories:
          type: array
          items:
            type: string
          description: Category IDs or names
        visibility:
          type: string
          description: Visibility (e.g., public, private)

    # Comment schemas
    Comment:
      type: object
      required:
        - id
        - body
        - created_at
        - updated_at
      properties:
        id:
          type: string
        body:
          type: string
          description: Comment text content
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/User"
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
        url:
          type: string
          description: Web UI URL
        resource:
          type: string
          description: API URL
        commentable:
          $ref: "#/components/schemas/Commentable"

    CommentMeta:
      type: object
      properties:
        id:
          type: string
        body:
          type: string
        created_at:
          type: string
          format: date-time
        url:
          type: string
        resource:
          type: string
        user:
          $ref: "#/components/schemas/User"

    Commentable:
      type: object
      description: The object that was commented on
      properties:
        type:
          type: string
          description: "Type of commentable (Feature, Idea, Release, etc.)"
        id:
          type: string
        product_id:
          type: string
        url:
          type: string
        resource:
          type: string

    Attachment:
      type: object
      properties:
        id:
          type: string
        download_url:
          type: string
        file_name:
          type: string
        file_size:
          type: integer
          format: int64
        content_type:
          type: string

    CommentResponse:
      type: object
      properties:
        comment:
          $ref: "#/components/schemas/Comment"

    CommentsResponse:
      type: object
      properties:
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentMeta"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CommentCreateRequest:
      type: object
      required:
        - comment
      properties:
        comment:
          $ref: "#/components/schemas/CommentCreate"

    CommentCreate:
      type: object
      required:
        - body
      properties:
        body:
          type: string
          description: Comment text content

    CommentUpdateRequest:
      type: object
      required:
        - comment
      properties:
        comment:
          $ref: "#/components/schemas/CommentUpdate"

    CommentUpdate:
      type: object
      properties:
        body:
          type: string
          description: Updated comment text content

    # Description can be either a string or an object with body/html_body fields
    # The Aha API returns description as an object for Ideas but sometimes as a string
    DescriptionObject:
      type: object
      properties:
        body:
          type: string
          description: Plain text description
        html_body:
          type: string
          description: HTML formatted description

    # Idea schemas
    Idea:
      type: object
      required:
        - id
        - name
        - reference_num
        - created_at
        - updated_at
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        description:
          $ref: "#/components/schemas/DescriptionObject"
        votes:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        status_changed_at:
          type: string
          format: date-time
        workflow_status:
          $ref: "#/components/schemas/WorkflowStatus"
        categories:
          type: array
          items:
            $ref: "#/components/schemas/Category"
        feature:
          $ref: "#/components/schemas/IdeaFeature"

    IdeaFeature:
      type: object
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        url:
          type: string
        resource:
          type: string
        product_id:
          type: string

    IdeaResponse:
      type: object
      properties:
        idea:
          $ref: "#/components/schemas/Idea"

    IdeasResponse:
      type: object
      properties:
        ideas:
          type: array
          items:
            $ref: "#/components/schemas/Idea"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # Epic schemas
    Epic:
      type: object
      required:
        - id
        - name
        - reference_num
        - created_at
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        description:
          type: string
        progress:
          type: number
          format: float
          description: Progress percentage (0-100)
        progress_source:
          type: string
          description: Source of progress calculation
        start_date:
          type: string
          format: date
          nullable: true
        due_date:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        url:
          type: string
          description: Web UI URL
        resource:
          type: string
          description: API URL
        comments_count:
          type: integer
          format: int64
        position:
          type: integer
          format: int64
        color:
          type: string
        workflow_status:
          $ref: "#/components/schemas/WorkflowStatus"
        release:
          $ref: "#/components/schemas/Release"
        initiative:
          $ref: "#/components/schemas/InitiativeMeta"
        tags:
          type: array
          items:
            type: string

    EpicMeta:
      type: object
      properties:
        id:
          type: string
        reference_num:
          type: string
        name:
          type: string
        created_at:
          type: string
          format: date-time
        url:
          type: string
        resource:
          type: string

    EpicResponse:
      type: object
      properties:
        epic:
          $ref: "#/components/schemas/Epic"

    EpicsResponse:
      type: object
      properties:
        epics:
          type: array
          items:
            $ref: "#/components/schemas/EpicMeta"
        pagination:
          $ref: "#/components/schemas/Pagination"

    EpicCreateRequest:
      type: object
      required:
        - epic
      properties:
        epic:
          $ref: "#/components/schemas/EpicCreate"

    EpicCreate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Epic name
        description:
          type: string
          description: Epic description (HTML allowed)
        workflow_status:
          type: string
          description: Workflow status ID or name
        start_date:
          type: string
          format: date
          nullable: true
