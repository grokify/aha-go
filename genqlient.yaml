# genqlient configuration for Aha.io GraphQL API
# Generated by gqlforge

schema:
  - graphql/schema.graphql

operations:
  - graphql/operations/*.graphql

generated: graphql/generated/generated.go

package: generated

# Use pointers for optional fields
optional: pointer

# Bindings for custom scalars used by Aha.io
bindings:
  ISO8601DateTime:
    type: time.Time
  ISO8601Date:
    type: string
  JSON:
    type: map[string]any
  BigInt:
    type: int64
