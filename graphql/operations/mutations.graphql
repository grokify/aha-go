# Create a record link between two records (e.g., feature relates to idea)
mutation CreateRecordLink(
  $parentType: LinkableRecordTypesEnum!
  $parentId: ID!
  $childType: LinkableRecordTypesEnum!
  $childId: ID!
  $linkType: RecordLinkTypeEnum!
) {
  createRecordLink(
    attributes: {
      parentRecord: { type: $parentType, id: $parentId }
      childRecord: { type: $childType, id: $childId }
      linkType: $linkType
    }
  ) {
    recordLink {
      id
      linkType
      relationDescription
      parentRecordId
      parentRecordType
      childRecordId
      childRecordType
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

# Get feature with integration links (Jira, etc.)
query GetFeatureWithIntegrations($id: ID!) {
  feature(id: $id) {
    id
    referenceNum
    name
    integrationLinks {
      name
      url
      integration {
        id
        name
      }
    }
    integrationLinksCount
    initiative {
      id
      referenceNum
      name
    }
    release {
      id
      referenceNum
      name
    }
  }
}

# Get feature with all record links
query GetFeatureWithLinks($id: ID!) {
  feature(id: $id) {
    id
    referenceNum
    name
    parentRecordLinks(
      filters: {
        linkType: [RELATES_TO, DEPENDS_ON, BLOCKS, BUILT_AS]
        recordType: [Feature, Idea, Initiative, Epic]
      }
    ) {
      id
      linkType
      relationDescription
      parentRecordId
      parentRecordType
    }
    childRecordLinks(
      filters: {
        linkType: [RELATES_TO, DEPENDS_ON, BLOCKS, BUILT_AS]
        recordType: [Feature, Idea, Initiative, Epic]
      }
    ) {
      id
      linkType
      relationDescription
      childRecordId
      childRecordType
    }
  }
}

# Create a feature with release (most common use case)
# Use skipRequiredFieldsValidation=true to bypass custom required field validation
mutation CreateFeatureWithRelease(
  $name: String!
  $releaseId: ID!
  $description: String
  $tagList: String
  $skipRequiredFieldsValidation: Boolean
) {
  createFeature(
    attributes: {
      name: $name
      release: { id: $releaseId }
      description: $description
      tagList: $tagList
    }
    skipRequiredFieldsValidation: $skipRequiredFieldsValidation
  ) {
    feature {
      id
      referenceNum
      name
      description {
        htmlBody
      }
      release {
        id
        referenceNum
        name
      }
      tags {
        id
        name
      }
      createdAt
      updatedAt
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

