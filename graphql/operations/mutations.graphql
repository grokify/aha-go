# Aha.io GraphQL Mutations
# Write operations for aha-go

# Update feature name
mutation UpdateFeatureName($id: ID!, $name: String!) {
  updateFeature(id: $id, attributes: { name: $name }) {
    feature {
      id
      referenceNum
      name
      updatedAt
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

# Update feature description
mutation UpdateFeatureDescription($id: ID!, $description: String!) {
  updateFeature(id: $id, attributes: { description: $description }) {
    feature {
      id
      referenceNum
      name
      description {
        htmlBody
      }
      updatedAt
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

