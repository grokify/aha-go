# Create a new idea
# Note: Description and tags must be set via separate mutations (UpdateIdea, etc.)
mutation CreateIdea(
  $name: String!
  $projectId: ID!
  $skipRequiredFieldsValidation: Boolean
) {
  createIdea(
    attributes: {
      name: $name
      project: { id: $projectId }
    }
    skipRequiredFieldsValidation: $skipRequiredFieldsValidation
  ) {
    idea {
      id
      referenceNum
      name
      workflowStatus {
        id
        name
      }
      createdAt
      updatedAt
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

# Set custom field values on a record
# typename must be one of: Feature, Idea, Epic, Release, Goal, Initiative, etc.
mutation SetCustomFieldValues(
  $recordId: ID!
  $recordTypename: CustomFieldableTypeEnum!
  $customFieldValues: [CustomFieldValueInput!]!
) {
  setCustomFieldValues(
    attributes: {
      record: { id: $recordId, typename: $recordTypename }
      customFieldValues: $customFieldValues
    }
  ) {
    customFieldValues {
      id
      key
      value
      humanValue
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}
