# Aha.io GraphQL Mutations
# Write operations for aha-go

# Update project/product name
mutation UpdateProjectName($id: ID!, $name: String!) {
  updateProject(id: $id, attributes: { name: $name }) {
    project {
      id
      referencePrefix
      name
      workspaceType
      updatedAt
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

