# Promote an idea to a feature
mutation PromoteIdeaToFeature($ideaId: ID!, $releaseId: ID) {
  promoteIdea(id: $ideaId, type: Feature, releaseId: $releaseId) {
    idea {
      id
      referenceNum
      name
    }
    promotable {
      ... on Feature {
        id
        referenceNum
        name
        release {
          id
          referenceNum
          name
        }
      }
    }
    errors {
      attributes {
        name
        fullMessages
      }
    }
  }
}

