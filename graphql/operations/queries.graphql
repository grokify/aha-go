# Get feature with screen definition (required fields)
query GetFeatureScreenDefinition($id: ID!) {
  feature(id: $id) {
    id
    referenceNum
    name
    screenDefinition {
      id
      screenableType
      screenDefinitionControls {
        id
        fieldId
        required
        readOnly
        customFieldDefinition {
          id
          key
          name
          type
        }
      }
    }
  }
}

# Get project custom field definitions (fields available to this team)
query GetProjectCustomFields($id: ID!) {
  project(id: $id) {
    id
    referencePrefix
    name
    customFieldsRelatedToTeam {
      id
      key
      name
      type
      customFieldOptions {
        id
        name
        color
        position
      }
    }
  }
}

# Get feature with custom field values
query GetFeatureWithCustomFields($id: ID!) {
  feature(id: $id) {
    id
    referenceNum
    name
    customFieldValues {
      id
      key
      value
      humanValue
    }
    screenDefinition {
      screenDefinitionControls {
        fieldId
        required
        customFieldDefinition {
          key
          name
        }
      }
    }
  }
}

# List features for a project/product with release info
# Supports filtering by release ID, pagination, and ordering by position (rank)
query ListFeatures($projectId: ID!, $page: Int, $per: Int, $releaseId: ID, $orderBy: [FeatureOrderClause!]) {
  features(
    filters: { projectId: $projectId, releaseId: $releaseId }
    order: $orderBy
    page: $page
    per: $per
  ) {
    nodes {
      id
      referenceNum
      name
      position
      tagList
      project {
        id
        name
        referencePrefix
      }
      workflowStatus {
        id
        name
        color
      }
      assignedToUser {
        id
        name
        email
      }
      release {
        id
        referenceNum
        name
        releaseDate
        startOn
        releasedOn
      }
      createdAt
      updatedAt
      dueDate
      startDate
    }
    currentPage
    totalPages
    totalCount
    isLastPage
  }
}

# List features by release date range
# Useful for finding features in releases with specific dates
query ListFeaturesByReleaseDate($projectId: ID!, $page: Int, $per: Int) {
  features(
    filters: { projectId: $projectId }
    page: $page
    per: $per
  ) {
    nodes {
      id
      referenceNum
      name
      workflowStatus {
        id
        name
      }
      release {
        id
        referenceNum
        name
        releaseDate
        startOn
        releasedOn
      }
      createdAt
      updatedAt
    }
    currentPage
    totalPages
    totalCount
    isLastPage
  }
}
