# Aha.io GraphQL Operations
# Generated by gqlforge scaffold, customized for aha-go

# Search documents across the Aha.io workspace
query SearchDocuments($query: String!, $searchableType: [String!]!) {
  searchDocuments(filters: {query: $query, searchableType: $searchableType}) {
    nodes {
      name
      url
      searchableId
      searchableType
    }
    currentPage
    totalCount
    totalPages
    isLastPage
  }
}

# Get a page by ID with optional parent inclusion
query GetPage($id: ID!, $includeParent: Boolean! = false) {
  page(id: $id) {
    id
    referenceNum
    name
    description {
      htmlBody
      markdownBody
    }
    children {
      id
      name
      referenceNum
    }
    parent @include(if: $includeParent) {
      id
      name
      referenceNum
    }
    createdAt
    updatedAt
  }
}

# Get a feature by ID
query GetFeature($id: ID!) {
  feature(id: $id) {
    id
    referenceNum
    name
    description {
      htmlBody
      markdownBody
    }
    workflowStatus {
      id
      name
      color
    }
    assignedToUser {
      id
      name
      email
    }
    release {
      id
      referenceNum
      name
      releaseDate
      startOn
      releasedOn
    }
    createdAt
    updatedAt
    dueDate
    startDate
  }
}

