# Get a project by ID (Aha uses "project" not "product" in GraphQL)
query GetProject($id: ID!) {
  project(id: $id) {
    id
    referencePrefix
    name
    workspaceType
    createdAt
    updatedAt
  }
}

# List projects/products (workspaces and teams)
query ListProjects($page: Int, $per: Int, $teams: Boolean, $parentId: ID) {
  projects(
    filters: { teams: $teams, parentId: $parentId }
    page: $page
    per: $per
  ) {
    currentPage
    totalCount
    totalPages
    isLastPage
    nodes {
      id
      referencePrefix
      name
      workspaceType
      isTeam
      createdAt
      updatedAt
      parent {
        id
        referencePrefix
        name
      }
    }
  }
}

