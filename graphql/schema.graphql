  "Change status to status with the category: 'initial', 'in_progress', 'done', 'shipped', 'will_not_implement'"
  category: String
}

"Attributes for setting a record's workspace restriction"
input WorkspaceRestrictionAttributes {
  restriction: WorkspaceRestrictionEnum!
  record: HasAccessRestrictionsRecordInput!
}

enum WorkspaceRestrictionEnum {
  "Use workspace access"
  DEFAULT
  "View only"
  VIEWER
  "Review only"
  REVIEWER
  "No access"
  NONE
}

"Requires that exactly one field must be supplied and that field must not be `null`."
directive @oneOf on INPUT_OBJECT

